<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Torneo - Veinte Por Diez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            padding: 40px 20px;
        }
        .container-narrow {
            max-width: 700px;
        }
        .container-narrow.card {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 50px;
        }
        .container-narrow h1 {
            color: var(--color-verde-padel-oscuro);
            text-align: center;
            margin-bottom: 30px;
            text-shadow: none;
        }
        .date-range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .date-field label {
            font-size: 14px;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }
        .btn-container .btn {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container container-narrow card">
        <h1>Nuevo Torneo</h1>
        <form method="POST" action="/new" enctype="multipart/form-data">
            <div class="form-group">
                <label for="tournament_name">Nombre del torneo</label>
                <input type="text" id="tournament_name" name="tournament_name" required>
            </div>

            <div class="form-group">
                <label for="mode">Modo</label>
                <select id="mode" name="mode" required>
                    <option value="">Selecciona un modo</option>
                    <option value="Por parejas">Por parejas</option>
                    <option value="Por equipos">Por equipos</option>
                </select>
            </div>

            <div class="form-group">
                <label for="logo">Logo del equipo</label>
                <input type="file" id="logo" name="logo" accept="image/png, image/jpeg" required>
                <div class="text-muted mt-1">Formatos aceptados: PNG, JPG</div>
            </div>

            <div class="form-group">
                <label>Fecha del torneo</label>
                <div class="date-range">
                    <div class="date-field">
                        <label for="start_date">Fecha de inicio</label>
                        <input type="date" id="start_date" name="start_date" required>
                    </div>
                    <div class="date-field">
                        <label for="end_date">Fecha de fin</label>
                        <input type="date" id="end_date" name="end_date" required>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <a href="/" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Crear Torneo</button>
            </div>
        </form>
    </div>
</body>
</html>
