<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Jugador - Veinte Por Diez</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            color: #f4d03f;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
            color: white;
        }
        .required::after {
            content: " *";
            color: #ff6b6b;
        }
        input[type="text"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .flash-messages {
            margin-bottom: 20px;
        }
        .flash {
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .flash.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .helper-text {
            font-size: 14px;
            color: #c0c0c0;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Nuevo Jugador</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="/players/new">
        <div class="form-group">
            <label for="first_name" class="required">Nombre</label>
            <input type="text" id="first_name" name="first_name" required title="Por favor completa este campo">
        </div>

        <div class="form-group">
            <label for="last_name">Apellido</label>
            <input type="text" id="last_name" name="last_name">
        </div>

        <div class="form-group">
            <label for="position" class="required">Posición</label>
            <select id="position" name="position" required title="Por favor selecciona una opción de la lista">
                <option value="">Selecciona una posición</option>
                <option value="drive">Drive</option>
                <option value="left">Revés</option>
            </select>
        </div>

        <div class="form-group">
            <label for="level" class="required">Nivel</label>
            <select id="level" name="level" required title="Por favor selecciona una opción de la lista">
                <option value="">Selecciona un nivel</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
            </select>
            <p class="helper-text">Escala del 1 (principiante) al 6 (avanzado)</p>
        </div>

        <div class="form-group">
            <label for="group" class="required">Grupo</label>
            <select id="group" name="group" required title="Por favor selecciona una opción de la lista">
                <option value="">Selecciona un grupo</option>
                <option value="A">A</option>
                <option value="B">B</option>
            </select>
        </div>

        <div class="form-group">
            <label for="phone" class="required">Teléfono</label>
            <input type="tel" id="phone" name="phone" required title="Por favor completa este campo">
        </div>

        <div class="form-group">
            <label for="notes">Notas</label>
            <textarea id="notes" name="notes" placeholder="Información adicional..."></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/players" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

    <script>
        // Custom validation messages in Spanish
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            form.addEventListener('submit', function(e) {
                const inputs = form.querySelectorAll('input[required], select[required]');
                inputs.forEach(input => {
                    if (!input.validity.valid) {
                        if (input.validity.valueMissing) {
                            if (input.tagName === 'SELECT') {
                                input.setCustomValidity('Por favor selecciona una opción de la lista');
                            } else {
                                input.setCustomValidity('Por favor completa este campo');
                            }
                        }
                    } else {
                        input.setCustomValidity('');
                    }
                });
            });

            // Reset custom validity on input
            const allInputs = form.querySelectorAll('input, select');
            allInputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.setCustomValidity('');
                });
            });
        });
    </script>
</body>
</html>
