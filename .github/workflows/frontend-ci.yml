name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-and-test:
    name: Build & Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: veinte-por-diez-frontend:latest
          load: true # Loads the image locally so it can be inspected/scanned

      - name: Inspect Docker Image Artifact
        run: |
          docker images
          docker inspect veinte-por-diez-frontend:latest

      - name: Register build artifact in CloudBees Unify
        uses: cloudbees-io-gha/register-build-artifact@v3
        with:
          name: veinte-por-diez-frontend
          version: ${{ github.sha }}
          url: https://github.com/${{ github.repository }}/pkgs/container/veinte-por-diez-frontend
          type: Docker
          commit: ${{ github.sha }}
          ref: ${{ github.ref }}
          repository-url: https://github.com/${{ github.repository }}
